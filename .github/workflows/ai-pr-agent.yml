name: AI PR Code Review Agent

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.txt

      - name: Call OpenAI API
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -s \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4.1-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a strict senior code reviewer."
                },
                {
                  "role": "user",
                  "content": "Review this diff and find issues:\n\n'"$(cat diff.txt | sed 's/"/\\"/g')"'
                }
              ]
            }')
      
          echo "$RESPONSE" > result.json
      
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat result.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.review.outputs.result }}
        with:
          script: |
            const res = JSON.parse(process.env.RESULT);
            
            // 🛑 Handle API errors safely
            if (!res.choices || !res.choices[0]) {
              core.setFailed("OpenAI API failed:\n" + JSON.stringify(res, null, 2));
              return;
            }
            
            const text = res.choices[0].message.content;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## 🤖 AI Code Review\n\n" + text
            });