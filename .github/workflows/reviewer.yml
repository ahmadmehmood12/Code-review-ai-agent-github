name: AI PR Reviewer (OpenAI)

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR Diff
        id: diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > pr.diff

      - name: Call OpenAI API
        id: ai_review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -s \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "model": "gpt-4.1-mini",
            "messages": [
              {
                "role": "system",
                "content": "You are a strict code reviewer."
              },
              {
                "role": "user",
                "content": "Review this diff and find issues:\n\n$(cat pr.diff)"
              }
            ]
          }
          EOF
          )

          echo "$RESPONSE" > response.json
          echo "response<<EOF" >> $GITHUB_OUTPUT
          cat response.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const response = JSON.parse(process.env.RESPONSE);
            const comment = response.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## 🤖 AI Review\n\n" + comment
            });
        env:
          RESPONSE: ${{ steps.ai_review.outputs.response }}